<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" shape-rendering="crispEdges" ><rect width="320" height="320" fill="#FFFAF1"/><style>.character,.left-eye,.left-pupil,.right-pupil,.left-leg,.right-leg,.slot{transform-box:fill-box}.character{transform-origin:center}.left-eye{transform-origin:center}.slot{transform-origin:center}.character{animation:work-bounce 720ms steps(2) infinite}.left-leg{animation:left-step 720ms steps(2) infinite}.right-leg{animation:right-step 720ms steps(2) infinite}.left-pupil,.right-pupil{animation:work-look 2.88s steps(1) infinite}.left-eye{animation:work-wink 4.32s steps(1) infinite}.slot{animation:speak 720ms steps(2) infinite}@keyframes work-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes left-step{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes right-step{0%,100%{transform:translateY(-8px)}50%{transform:translateY(0)}}@keyframes work-look{0%,38%,100%{transform:translateX(0)}42%,64%{transform:translateX(8px)}68%,90%{transform:translateX(-8px)}}@keyframes work-wink{0%,90%,96%,100%{transform:scaleY(1)}92%,94%{transform:scaleY(.16)}}@keyframes speak{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.55)}}</style><g class="character" fill="#3B78D8"><path d="M112 64h96v8h16v40h-16V80h-96v32H96V72h16z"/><rect x="40" y="104" width="240" height="104"/><rect class="left-leg" x="88" y="208" width="32" height="48"/><rect class="right-leg" x="200" y="208" width="32" height="48"/><g class="left-eye"><path fill="#FFFAF1" d="M72 128h48v8h8v40h-8v8H72v-8h-8v-40h8z"/><rect class="left-pupil" x="88" y="148" width="24" height="24"/></g><g class="right-eye"><path fill="#FFFAF1" d="M200 128h48v8h8v40h-8v8h-48v-8h-8v-40h8z"/><rect class="right-pupil" x="216" y="148" width="24" height="24"/></g><rect class="slot" x="112" y="192" width="96" height="8" fill="#FFFAF1"/></g></svg>
