<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stereo brand package</title>
  <style>
    :root { --blue:#3b78d8; --cream:#fffaf1; --ink:#24212a; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 36px; background: #ebe7df; color: var(--ink); font: 14px ui-monospace, SFMono-Regular, Menlo, monospace; }
    main { max-width: 1120px; margin: auto; }
    h1 { margin: 0; font: 700 34px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
    h2 { margin: 42px 0 14px; font: 650 19px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
    p { color: #6f6971; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
    .card { min-height: 190px; padding: 18px; display: grid; place-items: center; gap: 10px; background: var(--cream); }
    .card.dark { background: var(--ink); color: white; }
    .card.blue { background: var(--blue); color: white; }
    img, object { width: 120px; height: 120px; }
    .lockup { width: 260px; }
    code { color: var(--blue); }
  </style>
</head>
<body><main>
  <h1>Stereo</h1><p>Canonical identity package generated from one code source.</p>
  <h2>Core marks</h2>
  <div class="grid">
    <div class="card"><img src="assets/mark-primary.svg"><span>primary</span></div>
    <div class="card"><img src="assets/mark-silent.svg"><span>eyes-only / tiny</span></div>
    <div class="card"><img src="assets/mark-cassette.svg"><span>cassette</span></div>
    <div class="card"><img class="lockup" src="assets/lockup-primary.svg"><span>horizontal lockup</span></div>
    <div class="card blue"><img src="assets/mark-white.svg"><span>reversed</span></div>
  </div>
  <h2>Motion states</h2>
  <div class="grid">
    <div class="card"><object data="motion/idle.svg"></object><span>idle</span></div>
    <div class="card"><object data="motion/working.svg"></object><span>working + speaking</span></div>
    <div class="card"><object data="motion/wink.svg"></object><span>wink</span></div>
  </div>
  <h2>Application assets</h2>
  <div class="grid">
    <div class="card"><img src="assets/app-icon.svg"><span>app icon source</span></div>
    <div class="card"><img src="assets/favicon.svg"><span>favicon</span></div>
    <div class="card"><img src="assets/tray-template.svg"><span>tray template</span></div>
  </div>
</main></body>
</html>
